<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BipaAí | Checkout</title>
    <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="result-page">
    <main class="result-shell">
      <a class="brand result-brand" href="/" aria-label="Bipaai inicio">
        <span class="brand-mark" aria-hidden="true">
          <img src="/assets/logscan-mark.svg" alt="" />
        </span>
        <span>BipaAí</span>
      </a>

      <section class="result-panel" aria-live="polite">
        <p class="eyebrow" id="result-eyebrow">Checkout</p>
        <h1 id="result-title">Estamos conferindo seu pagamento.</h1>
        <p id="result-copy">
          Volte para o seu app e aproveite.
        </p>
        <div class="result-actions">
          <a class="primary-button ghost-action" href="/">Voltar para o site</a>
        </div>
      </section>
    </main>

    <script>
      const state = location.pathname.split("/").pop();
      const content = {
        success: {
          eyebrow: "Pagamento enviado",
          title: "Tudo certo por aqui.",
          copy: "Volte para o seu app e aproveite."
        },
        cancel: {
          eyebrow: "Checkout cancelado",
          title: "Pagamento nao concluído.",
          copy: "Voce pode voltar aos planos e iniciar um novo checkout quando quiser."
        },
        expired: {
          eyebrow: "Checkout expirado",
          title: "Esse link expirou.",
          copy: "Volte para o site e gere um novo checkout para continuar."
        }
      };

      const selected = content[state] || content.success;
      document.querySelector("#result-eyebrow").textContent = selected.eyebrow;
      document.querySelector("#result-title").textContent = selected.title;
      document.querySelector("#result-copy").textContent = selected.copy;
    </script>
  </body>
</html>
