<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BipaAí | Checkout</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="result-page">
    <main class="result-shell">
      <a class="brand result-brand" href="/" aria-label="Bipaai inicio">
        <span class="brand-mark" aria-hidden="true">
          <img src="/assets/logscan-mark.svg" alt="" />
        </span>
        <span>BipaAí</span>
      </a>

      <section class="result-panel" aria-live="polite">
        <p class="eyebrow" id="result-eyebrow">Checkout</p>
        <h1 id="result-title">Estamos conferindo seu pagamento.</h1>
        <p id="result-copy">
          Acompanhe pelo app a liberacao do seu plano. Assim que o Asaas confirmar o pagamento, o acesso sera atualizado automaticamente.
        </p>
        <div class="result-actions">
          <a class="primary-button" id="open-app-link" href="appscanner://billing/success">Abrir app</a>
          <a class="primary-button ghost-action" href="/">Voltar para a landing</a>
        </div>
      </section>
    </main>

    <script>
      const state = location.pathname.split("/").pop();
      const content = {
        success: {
          eyebrow: "Pagamento enviado",
          title: "Tudo certo por aqui.",
          copy: "Abra o app e acompanhe por la a liberacao do seu plano. O Asaas vai avisar o Bipaai pelo webhook e, depois da confirmação do pagamento, o acesso sera atualizado automaticamente."
        },
        cancel: {
          eyebrow: "Checkout cancelado",
          title: "Pagamento nao concluído.",
          copy: "Voce pode voltar aos planos e iniciar um novo checkout quando quiser."
        },
        expired: {
          eyebrow: "Checkout expirado",
          title: "Esse link expirou.",
          copy: "Volte para a landing e gere um novo checkout para continuar."
        }
      };

      const selected = content[state] || content.success;
      document.querySelector("#result-eyebrow").textContent = selected.eyebrow;
      document.querySelector("#result-title").textContent = selected.title;
      document.querySelector("#result-copy").textContent = selected.copy;

      const appUrl = `appscanner://billing/${state || "success"}${location.search || ""}`;
      const openAppLink = document.querySelector("#open-app-link");
      openAppLink.href = appUrl;

      if (state === "success") {
        window.setTimeout(() => {
          location.href = appUrl;
        }, 700);
      }
    </script>
  </body>
</html>
